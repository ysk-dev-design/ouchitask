<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="おうちタスク">
  <meta name="theme-color" content="#2D3748">
  <title>おうちタスク</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:-apple-system,'Hiragino Sans',sans-serif; background:#F4F6FA; }
    #root { min-height:100vh; }
    .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px); background:#2D3748; color:#fff; padding:10px 24px; border-radius:99px; font-size:14px; font-weight:600; box-shadow:0 4px 16px rgba(0,0,0,0.2); white-space:nowrap; z-index:300; opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .layout-switcher { display:flex; gap:4px; align-items:center; }
    .layout-btn { background:rgba(255,255,255,0.15); color:#fff; border:none; border-radius:7px; padding:4px 9px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; line-height:1.4; transition:background 0.15s; }
    .layout-btn.active { background:rgba(255,255,255,0.45); }
    .sort-btn { background:none; border:1px solid rgba(0,0,0,0.12); color:#AAA; border-radius:5px; width:22px; height:22px; font-size:10px; cursor:pointer; line-height:1; padding:0; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
    .sort-btn:active { background:#EEE; }
    .sort-btn:disabled { opacity:0.2; cursor:default; pointer-events:none; }
    .sort-controls { display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
  </style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1oG0hjv5AMlE40jnzP4ke_HDl6vMv5R0ioxxIzLzNt4fNXRwpB84ajxM778xmFZVu/exec";
const LOCAL_KEY = "ouchitask-v3";
const LAYOUT_KEY_PREFIX = "ouchitask-layout-";

const DEFAULT_DATA = [
  { id:"g1", name:"室内", icon:"🏠", tasks:[
    { id:"t1", name:"トイレ掃除", icon:"🚽", intervalDays:7, history:[] },
    { id:"t2", name:"風呂掃除", icon:"🛁", intervalDays:7, history:[] },
    { id:"t3", name:"掃除機", icon:"🧹", intervalDays:3, history:[] },
  ]},
  { id:"g2", name:"室外・車", icon:"🚗", tasks:[
    { id:"t4", name:"洗車", icon:"🚗", intervalDays:30, history:[] },
    { id:"t5", name:"ゴミ出し確認", icon:"🗑️", intervalDays:7, history:[] },
  ]},
  { id:"g3", name:"身の回り", icon:"✂️", tasks:[
    { id:"t6", name:"散髪", icon:"✂️", intervalDays:42, history:[] },
  ]},
];

// ── ユーティリティ ──
function today() { return new Date().toISOString().split("T")[0]; }
function daysSince(str) {
  if (!str) return null;
  const d = new Date(str); d.setHours(0,0,0,0);
  const n = new Date(); n.setHours(0,0,0,0);
  return Math.floor((n - d) / 86400000);
}
function getStatus(days, interval) {
  if (days === null) return "none";
  if (days >= interval) return "over";
  if (days >= interval * 0.65) return "warn";
  return "good";
}
function fmtDate(str) {
  if (!str) return null;
  const d = new Date(str);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
const WEEKDAYS = ["日","月","火","水","木","金","土"];
function fmtDateWithDay(str) {
  if (!str) return null;
  const d = new Date(str);
  return `${d.getMonth()+1}/${d.getDate()}(${WEEKDAYS[d.getDay()]})`;
}
function fmtDateLong(str) {
  if (!str) return null;
  const d = new Date(str);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function uid() { return Math.random().toString(36).slice(2,9); }
function lastDone(task) {
  if (!task.history || !task.history.length) return null;
  return [...task.history].sort().slice(-1)[0];
}

const STATUS = {
  good:{ bar:"#4CAF50", bg:"#E8F5E9", text:"#2E7D32", label:"良好" },
  warn:{ bar:"#FF9800", bg:"#FFF3E0", text:"#E65100", label:"もうすぐ" },
  over:{ bar:"#F44336", bg:"#FFEBEE", text:"#B71C1C", label:"超過" },
  none:{ bar:"#BDBDBD", bg:"#F5F5F5", text:"#757575", label:"未実施" },
};

// ── データ管理 ──
let groups = [];
let isSyncing = false;
let pendingSave = false;

async function loadFromCloud() {
  try {
    const res = await fetch(SCRIPT_URL, { redirect:"follow" });
    const text = await res.text();
    const parsed = JSON.parse(text);
    if (Array.isArray(parsed) && parsed.length > 0) {
      groups = parsed.map(g => ({ ...g, tasks: g.tasks.map(t => ({ ...t, history: t.history || [] })) }));
    } else {
      loadLocal();
      await saveToCloud();
    }
    saveLocal();
    return true;
  } catch(e) {
    console.warn("クラウド読み込み失敗、ローカルを使用:", e);
    loadLocal();
    return false;
  }
}
async function saveToCloud() {
  if (isSyncing) { pendingSave = true; return; }
  isSyncing = true;
  try {
    await fetch(SCRIPT_URL, {
      method:"POST", redirect:"follow",
      headers:{ "Content-Type":"text/plain" },
      body: JSON.stringify(groups)
    });
  } catch(e) { console.warn("クラウド保存失敗:", e); }
  isSyncing = false;
  if (pendingSave) { pendingSave = false; saveToCloud(); }
}
function loadLocal() {
  try {
    const s = localStorage.getItem(LOCAL_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      groups = parsed.map(g => ({ ...g, tasks: g.tasks.map(t => ({ ...t, history: t.history || (t.lastDone ? [t.lastDone] : []) })) }));
      return;
    }
  } catch {}
  groups = JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveLocal() {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(groups)); } catch {}
}
function saveGroups() { saveLocal(); saveToCloud(); }

// ── トースト ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
}

// ── レイアウト列数管理 ──
function getDeviceKey() {
  const w = window.innerWidth;
  if (w <= 500) return "mobile";
  if (w <= 900) return "tablet";
  return "desktop";
}
function getLayoutCols() {
  return parseInt(localStorage.getItem(LAYOUT_KEY_PREFIX + getDeviceKey()) || "2");
}
function setLayoutCols(cols) {
  localStorage.setItem(LAYOUT_KEY_PREFIX + getDeviceKey(), cols);
  render();
}

// ── 並び替え ──
function moveGroup(groupId, dir) {
  const idx = groups.findIndex(g => g.id === groupId);
  if (idx < 0) return;
  const next = idx + dir;
  if (next < 0 || next >= groups.length) return;
  const arr = [...groups];
  [arr[idx], arr[next]] = [arr[next], arr[idx]];
  groups = arr;
  saveGroups(); render();
}
function moveTask(groupId, taskId, dir) {
  const g = groups.find(g => g.id === groupId);
  if (!g) return;
  const idx = g.tasks.findIndex(t => t.id === taskId);
  if (idx < 0) return;
  const next = idx + dir;
  if (next < 0 || next >= g.tasks.length) return;
  const arr = [...g.tasks];
  [arr[idx], arr[next]] = [arr[next], arr[idx]];
  g.tasks = arr;
  saveGroups(); render();
}

// ── グラフ ──
function buildChartData(task) {
  const hist = new Set(task.history || []);
  const sorted = [...hist].sort();
  if (!sorted.length) return [];
  const data = [];
  let count = 0;
  const end = new Date();
  const start = new Date(sorted[0]);
  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    const ds = d.toISOString().split("T")[0];
    if (hist.has(ds)) { count = 0; } else { count++; }
    data.push({ label: fmtDateWithDay(ds), days:count, done:hist.has(ds) });
  }
  return data;
}
function drawChart(canvas, task) {
  const data = buildChartData(task);
  const dpr = window.devicePixelRatio || 1;
  const displayW = canvas.offsetWidth;
  const displayH = 200;
  canvas.width = displayW * dpr;
  canvas.height = displayH * dpr;
  canvas.style.width = displayW + "px";
  canvas.style.height = displayH + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const W = displayW, H = displayH;
  const pad = { top:16, right:28, bottom:36, left:32 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;
  ctx.clearRect(0,0,W,H);
  if (data.length < 2) {
    ctx.fillStyle = "#BDBDBD"; ctx.font = "12px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("記録が2件以上になるとグラフが表示されます", W/2, H/2);
    return;
  }
  const maxY = Math.max(...data.map(d=>d.days), task.intervalDays) * 1.1;
  const xp = i => pad.left + i * (cW / (data.length-1));
  const yp = v => pad.top + cH - (v/maxY)*cH;
  ctx.strokeStyle="#F0F0F0"; ctx.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(r => {
    const y = pad.top + cH*(1-r);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cW,y); ctx.stroke();
    ctx.fillStyle="#AAA"; ctx.font="9px sans-serif"; ctx.textAlign="right";
    ctx.fillText(Math.round(maxY*r), pad.left-4, y+3);
  });
  const refY = yp(task.intervalDays);
  ctx.strokeStyle="#F44336"; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(pad.left,refY); ctx.lineTo(pad.left+cW,refY); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle="#F44336"; ctx.font="9px sans-serif"; ctx.textAlign="left";
  ctx.fillText("目安", pad.left+cW+2, refY+3);
  ctx.beginPath();
  ctx.moveTo(xp(0), yp(data[0].days));
  data.forEach((d,i) => { if(i>0) ctx.lineTo(xp(i),yp(d.days)); });
  ctx.lineTo(xp(data.length-1), pad.top+cH); ctx.lineTo(xp(0), pad.top+cH); ctx.closePath();
  const grad = ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
  grad.addColorStop(0,"rgba(92,107,192,0.18)"); grad.addColorStop(1,"rgba(92,107,192,0)");
  ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle="#5C6BC0"; ctx.lineWidth=2;
  data.forEach((d,i) => { i===0?ctx.moveTo(xp(i),yp(d.days)):ctx.lineTo(xp(i),yp(d.days)); });
  ctx.stroke();
  data.forEach((d,i) => {
    if(d.done) {
      ctx.beginPath(); ctx.arc(xp(i),yp(d.days),5,0,Math.PI*2);
      ctx.fillStyle="#5C6BC0"; ctx.fill();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
    }
  });
  const step = Math.max(1, Math.floor(data.length/5));
  data.forEach((d,i) => {
    if (i % step === 0 || i === data.length-1) {
      const x = xp(i);
      ctx.fillStyle="#AAA"; ctx.font="9px sans-serif"; ctx.textAlign="center";
      const parts = d.label.match(/^(\d+\/\d+)\((.)\)$/);
      if (parts) {
        ctx.fillText(parts[1], x, H - 18);
        const wd = parts[2];
        ctx.fillStyle = wd==="日"?"#F44336": wd==="土"?"#2196F3":"#AAA";
        ctx.fillText(`(${wd})`, x, H - 6);
        ctx.fillStyle="#AAA";
      } else {
        ctx.fillText(d.label, x, H - 8);
      }
    }
  });
}

// ── 画面状態 ──
// currentView: "loading" / "main" / "group" / "chart"
let currentView = "loading";
let currentGroupId = null;  // group画面で表示中のグループID
let chartTaskId = null;
let chartFromGroup = false; // グラフの戻り先フラグ
let modalType = null;
let formData = {};
let showMenu = false;

// ── レンダリング ──
function render() {
  const root = document.getElementById("root");
  if (currentView === "loading") {
    root.innerHTML = `
      <div style="min-height:100vh;background:linear-gradient(135deg,#2D3748,#4A5568);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:16px;">
        <div style="font-size:52px;">🏠</div>
        <div style="font-size:18px;font-weight:700;">おうちタスク</div>
        <div style="display:flex;align-items:center;gap:8px;opacity:0.6;font-size:13px;">
          <div class="spinner"></div>データを読み込み中...
        </div>
      </div>`;
    return;
  }
  if (currentView === "chart") {
    root.innerHTML = renderChartScreen();
    const task = findTask(chartTaskId);
    const canvas = document.getElementById("chart-canvas");
    if (task && canvas) { requestAnimationFrame(() => drawChart(canvas, task)); }
  } else if (currentView === "group") {
    root.innerHTML = renderGroupScreen();
  } else {
    root.innerHTML = renderMain();
  }
  if (modalType) root.innerHTML += renderModal();
}

function findTask(id) { for(const g of groups){ const t=g.tasks.find(t=>t.id===id); if(t) return t; } return null; }
function findGroup(id) { return groups.find(g=>g.id===id); }

// ── ヘッダー共通パーツ ──
function renderHeader({ title, subtitle, backFn, showControls }) {
  const cols = getLayoutCols();
  const now = new Date();
  const dateLabel = `${now.getMonth()+1}月${now.getDate()}日（${WEEKDAYS[now.getDay()]}）`;
  return `
  <div style="background:linear-gradient(135deg,#2D3748,#4A5568);padding:28px 20px 18px;color:#fff;position:relative;">
    <div style="font-size:11px;opacity:0.55;letter-spacing:1.5px;margin-bottom:4px;">${dateLabel}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;row-gap:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        ${backFn ? `<button onclick="${backFn}()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:99px;padding:5px 12px;font-size:13px;cursor:pointer;font-family:inherit;">← 戻る</button>` : ""}
        <div style="font-size:20px;font-weight:700;">${title}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        ${subtitle ? `<div style="font-size:11px;opacity:0.55;">${subtitle}</div>` : ""}
        <div class="layout-switcher">
          <button class="layout-btn${cols===1?" active":""}" onclick="setLayoutCols(1)">1</button>
          <button class="layout-btn${cols===2?" active":""}" onclick="setLayoutCols(2)">2</button>
          <button class="layout-btn${cols===3?" active":""}" onclick="setLayoutCols(3)">3</button>
        </div>
        ${showControls ? `
        <button onclick="syncNow()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;" title="同期">🔄</button>
        <button onclick="toggleMenu()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;">⋮</button>
        ` : ""}
      </div>
    </div>
  </div>`;
}

// ── メイン画面（グループ一覧） ──
function renderMain() {
  const cols = getLayoutCols();
  const totalAlert = groups.reduce((acc,g)=>acc+g.tasks.filter(t=>{const d=daysSince(lastDone(t));return d===null||d>=t.intervalDays;}).length,0);
  const now = new Date();
  const dateLabel = `${now.getMonth()+1}月${now.getDate()}日（${WEEKDAYS[now.getDay()]}）`;

  let html = `
  <div style="background:linear-gradient(135deg,#2D3748,#4A5568);padding:28px 20px 18px;color:#fff;position:relative;">
    <div style="font-size:11px;opacity:0.55;letter-spacing:1.5px;margin-bottom:4px;">${dateLabel}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;row-gap:8px;">
      <div style="font-size:22px;font-weight:700;">おうちタスク</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        ${totalAlert>0?`<div style="background:#F44336;color:#fff;border-radius:99px;font-size:12px;font-weight:700;padding:3px 10px;">${totalAlert}件要対応</div>`:""}
        <div class="layout-switcher">
          <button class="layout-btn${cols===1?" active":""}" onclick="setLayoutCols(1)">1</button>
          <button class="layout-btn${cols===2?" active":""}" onclick="setLayoutCols(2)">2</button>
          <button class="layout-btn${cols===3?" active":""}" onclick="setLayoutCols(3)">3</button>
        </div>
        <button onclick="syncNow()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;" title="同期">🔄</button>
        <button onclick="toggleMenu()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;">⋮</button>
      </div>
    </div>
    <div style="font-size:11px;opacity:0.45;margin-top:4px;">グループをタップするとタスク一覧へ</div>
    ${showMenu ? `
    <div onclick="toggleMenu()" style="position:fixed;inset:0;z-index:100;">
      <div onclick="event.stopPropagation()" style="position:absolute;top:84px;right:16px;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,0.15);overflow:hidden;min-width:190px;z-index:101;">
        <button onclick="exportData()" style="width:100%;padding:14px 18px;border:none;background:none;font-size:14px;cursor:pointer;font-family:inherit;text-align:left;color:#333;border-bottom:1px solid #F0F0F0;">📤 バックアップを保存</button>
        <label style="display:flex;align-items:center;padding:14px 18px;font-size:14px;cursor:pointer;color:#333;">
          📥 バックアップから復元
          <input type="file" accept=".json" onchange="importData(event)" style="display:none;">
        </label>
      </div>
    </div>` : ""}
  </div>
  <div style="padding:14px 12px 80px;">`;

  if (cols === 1) {
    // 1列：リスト形式グループ
    groups.forEach((g, gi) => { html += renderGroupRow(g, gi, groups.length); });
  } else {
    // 2列・3列：グループカードグリッド
    html += `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:10px;">`;
    groups.forEach((g, gi) => { html += renderGroupCard(g, gi, groups.length); });
    html += `</div>`;
  }

  html += `
    <button onclick="openModal('addGroup')" style="width:100%;padding:11px;border-radius:12px;border:2px dashed #D0D0D0;background:transparent;color:#C0C0C0;font-size:13px;cursor:pointer;font-family:inherit;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:5px;">
      <span style="font-size:16px;">＋</span> グループを追加
    </button>
  </div>`;
  return html;
}

// 1列用グループ行
function renderGroupRow(g, gi, total) {
  const alertCount = g.tasks.filter(t=>{const d=daysSince(lastDone(t));return d===null||d>=t.intervalDays;}).length;
  const doneCount = g.tasks.filter(t => lastDone(t)===today()).length;
  return `
  <div style="background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 8px rgba(0,0,0,0.07);overflow:hidden;">
    <div style="display:flex;align-items:center;gap:8px;padding:12px 14px;">
      <div onclick="openGroup('${g.id}')" style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;min-width:0;">
        <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#EEF0FF,#E8E0FF);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${g.icon}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:700;color:#1a1a2e;">${g.name}</div>
          <div style="font-size:11px;color:#AAA;margin-top:2px;">${g.tasks.length}タスク${doneCount>0?` · 今日${doneCount}件完了`:""}</div>
        </div>
        ${alertCount>0?`<span style="background:#F44336;color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:2px 8px;white-space:nowrap;">${alertCount}</span>`:""}
        <span style="color:#bbb;font-size:13px;">›</span>
      </div>
      <div class="sort-controls">
        <button class="sort-btn" onclick="moveGroup('${g.id}',-1)" ${gi===0?"disabled":""}>▲</button>
        <button class="sort-btn" onclick="moveGroup('${g.id}',1)" ${gi===total-1?"disabled":""}>▼</button>
      </div>
      <button onclick="openModal('editGroup','${g.id}')" style="background:none;border:none;color:#CCC;font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0;">✏️</button>
    </div>
  </div>`;
}

// 2列・3列用グループカード
function renderGroupCard(g, gi, total) {
  const alertCount = g.tasks.filter(t=>{const d=daysSince(lastDone(t));return d===null||d>=t.intervalDays;}).length;
  const doneCount = g.tasks.filter(t => lastDone(t)===today()).length;
  const overCount = g.tasks.filter(t=>{const d=daysSince(lastDone(t));return d!==null&&d>=t.intervalDays;}).length;
  const warnCount = g.tasks.filter(t=>{const d=daysSince(lastDone(t));const s=getStatus(d,t.intervalDays);return s==="warn";}).length;
  // ステータスバー（タスク数をカラー別に可視化）
  const total2 = g.tasks.length || 1;
  const goodCount = g.tasks.length - alertCount - warnCount;
  return `
  <div style="background:#fff;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,0.07);overflow:hidden;display:flex;flex-direction:column;">
    <div onclick="openGroup('${g.id}')" style="cursor:pointer;padding:14px 12px 10px;flex:1;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
        <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#EEF0FF,#E8E0FF);display:flex;align-items:center;justify-content:center;font-size:22px;">${g.icon}</div>
        ${alertCount>0?`<span style="background:#F44336;color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:2px 7px;">${alertCount}</span>`:""}
      </div>
      <div style="font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:2px;">${g.name}</div>
      <div style="font-size:10px;color:#AAA;margin-bottom:8px;">${g.tasks.length}タスク${doneCount>0?` · 今日${doneCount}件`:""}</div>
      <div style="height:4px;border-radius:99px;background:#F0F0F0;overflow:hidden;display:flex;">
        <div style="width:${overCount/total2*100}%;background:#F44336;"></div>
        <div style="width:${warnCount/total2*100}%;background:#FF9800;"></div>
        <div style="width:${goodCount/total2*100}%;background:#4CAF50;"></div>
      </div>
    </div>
    <div style="display:flex;border-top:1px solid #F5F5F5;">
      <div style="display:flex;gap:2px;padding:6px 8px;flex:1;align-items:center;">
        <button class="sort-btn" onclick="moveGroup('${g.id}',-1)" ${gi===0?"disabled":""}>◀</button>
        <button class="sort-btn" onclick="moveGroup('${g.id}',1)" ${gi===total-1?"disabled":""}>▶</button>
      </div>
      <button onclick="openModal('editGroup','${g.id}')" style="background:none;border:none;color:#CCC;font-size:13px;cursor:pointer;padding:6px 10px;">✏️</button>
    </div>
  </div>`;
}

// ── グループ内タスク一覧画面 ──
function openGroup(groupId) {
  currentGroupId = groupId;
  currentView = "group";
  render();
}
function closeGroup() {
  currentView = "main";
  currentGroupId = null;
  render();
}

function renderGroupScreen() {
  const g = findGroup(currentGroupId);
  if (!g) { closeGroup(); return ""; }
  const cols = getLayoutCols();
  const alertCount = g.tasks.filter(t=>{const d=daysSince(lastDone(t));return d===null||d>=t.intervalDays;}).length;
  const now = new Date();
  const dateLabel = `${now.getMonth()+1}月${now.getDate()}日（${WEEKDAYS[now.getDay()]}）`;

  let html = `
  <div style="background:linear-gradient(135deg,#2D3748,#4A5568);padding:28px 20px 18px;color:#fff;position:relative;">
    <div style="font-size:11px;opacity:0.55;letter-spacing:1.5px;margin-bottom:4px;">${dateLabel}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;row-gap:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="closeGroup()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:99px;padding:5px 12px;font-size:13px;cursor:pointer;font-family:inherit;">← 戻る</button>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:22px;">${g.icon}</span>
          <span style="font-size:20px;font-weight:700;">${g.name}</span>
          ${alertCount>0?`<span style="background:#F44336;color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:2px 8px;">${alertCount}</span>`:""}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="layout-switcher">
          <button class="layout-btn${cols===1?" active":""}" onclick="setLayoutCols(1)">1</button>
          <button class="layout-btn${cols===2?" active":""}" onclick="setLayoutCols(2)">2</button>
          <button class="layout-btn${cols===3?" active":""}" onclick="setLayoutCols(3)">3</button>
        </div>
      </div>
    </div>
    <div style="font-size:11px;opacity:0.45;margin-top:4px;">タスク名タップでグラフ・履歴編集</div>
  </div>
  <div style="padding:14px 12px 80px;">`;

  if (cols === 1) {
    html += `<div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,0.07);">`;
    g.tasks.forEach((t, ti) => { html += renderTaskRow(t, g.id, ti, g.tasks.length); });
    html += `<button onclick="openModal('addTask','${g.id}')" style="width:100%;padding:9px 12px;border:none;background:#FAFAFA;color:#C0C0C0;font-size:12px;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:5px;"><span style="font-size:14px;">＋</span> タスクを追加</button></div>`;
  } else {
    html += `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:8px;">`;
    g.tasks.forEach((t, ti) => { html += renderTaskCard(t, g.id, ti, g.tasks.length); });
    html += `</div>`;
    html += `<button onclick="openModal('addTask','${g.id}')" style="width:100%;padding:9px 12px;border-radius:10px;border:2px dashed #E0E0E0;background:transparent;color:#C0C0C0;font-size:12px;cursor:pointer;font-family:inherit;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:5px;"><span style="font-size:14px;">＋</span> タスクを追加</button>`;
  }

  html += `</div>`;
  return html;
}

// ── タスク行（1列用） ──
function renderTaskRow(task, groupId, ti, totalTasks) {
  const last = lastDone(task);
  const days = daysSince(last);
  const status = getStatus(days, task.intervalDays);
  const cfg = STATUS[status];
  const progress = days===null?0:Math.min(days/task.intervalDays,1);
  const daysLeft = days===null?null:task.intervalDays-days;
  const doneToday = last===today();
  return `
  <div style="display:flex;align-items:center;gap:6px;padding:9px 10px;background:#fff;border-bottom:1px solid #F5F5F5;">
    <div class="sort-controls">
      <button class="sort-btn" onclick="moveTask('${groupId}','${task.id}',-1)" ${ti===0?"disabled":""}>▲</button>
      <button class="sort-btn" onclick="moveTask('${groupId}','${task.id}',1)" ${ti===totalTasks-1?"disabled":""}>▼</button>
    </div>
    <div style="position:relative;flex-shrink:0;">
      <div style="width:34px;height:34px;border-radius:9px;background:${doneToday?"#E8F5E9":cfg.bg};display:flex;align-items:center;justify-content:center;font-size:17px;">${doneToday?"✅":task.icon}</div>
      <div style="position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:${doneToday?"#4CAF50":cfg.bar};border:2px solid #fff;"></div>
    </div>
    <div onclick="openChart('${task.id}')" style="flex:1;min-width:0;cursor:pointer;">
      <div style="display:flex;align-items:baseline;gap:5px;">
        <span style="font-size:13px;font-weight:600;color:#1a1a2e;">${task.name}</span>
        <span style="font-size:10px;color:#bbb;">${task.intervalDays}日</span>
      </div>
      <div style="margin-top:3px;background:#F0F0F0;border-radius:99px;height:3px;">
        <div style="width:${progress*100}%;background:${doneToday?"#4CAF50":cfg.bar};height:100%;border-radius:99px;"></div>
      </div>
      <div style="margin-top:3px;font-size:10px;color:${doneToday?"#2E7D32":cfg.text};">
        ${doneToday?"今日実施済み ✓":days===null?"未実施":daysLeft>0?`${days}日前（あと${daysLeft}日）`:`${days}日前（${-daysLeft}日超過）`}
        ${last&&!doneToday?`<span style="color:#bbb;margin-left:5px;">${fmtDate(last)}</span>`:""}
      </div>
    </div>
    ${doneToday?`<button onclick="handleUndo('${task.id}')" style="flex-shrink:0;padding:5px 8px;border-radius:8px;border:1.5px solid #FFCDD2;background:#FFF5F5;color:#E53935;font-size:10px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap;">取消</button>`:""}
    ${!doneToday?`<button onclick="handleDone('${task.id}')" style="flex-shrink:0;width:40px;height:40px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#5C6BC0,#7E57C2);color:#fff;font-size:16px;box-shadow:0 2px 6px rgba(92,107,192,0.3);">✓</button>`:""}
    <button onclick="openModal('editTask','${task.id}')" style="flex-shrink:0;width:24px;height:24px;border-radius:6px;border:none;background:none;cursor:pointer;color:#CCC;font-size:13px;padding:0;">⋯</button>
  </div>`;
}

// ── タスクカード（2列・3列用） ──
function renderTaskCard(task, groupId, ti, totalTasks) {
  const last = lastDone(task);
  const days = daysSince(last);
  const status = getStatus(days, task.intervalDays);
  const cfg = STATUS[status];
  const progress = days===null?0:Math.min(days/task.intervalDays,1);
  const daysLeft = days===null?null:task.intervalDays-days;
  const doneToday = last===today();
  return `
  <div style="background:#fff;border-radius:12px;padding:10px;box-shadow:0 1px 8px rgba(0,0,0,0.07);display:flex;flex-direction:column;gap:6px;">

      <div style="position:relative;flex-shrink:0;">
        <div style="width:28px;height:28px;border-radius:7px;background:${doneToday?"#E8F5E9":cfg.bg};display:flex;align-items:center;justify-content:center;font-size:14px;">${doneToday?"✅":task.icon}</div>
        <div style="position:absolute;bottom:0;right:0;width:7px;height:7px;border-radius:50%;background:${doneToday?"#4CAF50":cfg.bar};border:1.5px solid #fff;"></div>
      </div>
      <div class="sort-controls" style="flex-direction:row;">
        <button class="sort-btn" onclick="moveTask('${groupId}','${task.id}',-1)" ${ti===0?"disabled":""}>◀</button>
        <button class="sort-btn" onclick="moveTask('${groupId}','${task.id}',1)" ${ti===totalTasks-1?"disabled":""}>▶</button>
      </div>
      <button onclick="openModal('editTask','${task.id}')" style="width:20px;height:20px;border-radius:5px;border:none;background:none;cursor:pointer;color:#CCC;font-size:12px;padding:0;flex-shrink:0;">⋯</button>
    </div>
    <div onclick="openChart('${task.id}')" style="cursor:pointer;flex:1;">
      <div style="font-size:12px;font-weight:600;color:#1a1a2e;line-height:1.3;">${task.name}</div>
      <div style="font-size:10px;color:#bbb;margin-top:1px;">${task.intervalDays}日ごと</div>
      <div style="margin-top:5px;background:#F0F0F0;border-radius:99px;height:3px;">
        <div style="width:${progress*100}%;background:${doneToday?"#4CAF50":cfg.bar};height:100%;border-radius:99px;"></div>
      </div>
      <div style="margin-top:3px;font-size:10px;color:${doneToday?"#2E7D32":cfg.text};line-height:1.3;">
        ${doneToday?"今日実施済み ✓":days===null?"未実施":daysLeft>0?`あと${daysLeft}日`:`${-daysLeft}日超過`}
      </div>
    </div>
    <div style="display:flex;gap:4px;">
      ${doneToday
        ?`<button onclick="handleUndo('${task.id}')" style="flex:1;padding:6px 4px;border-radius:8px;border:1.5px solid #FFCDD2;background:#FFF5F5;color:#E53935;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;">取消</button>`
        :`<button onclick="handleDone('${task.id}')" style="flex:1;padding:7px 4px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,#5C6BC0,#7E57C2);color:#fff;font-size:14px;box-shadow:0 2px 6px rgba(92,107,192,0.3);">✓</button>`}
    </div>
  </div>`;
}

// ── グラフ画面 ──
function renderChartScreen() {
  const task = findTask(chartTaskId);
  if (!task) return "";
  const last = lastDone(task);
  const days = daysSince(last);
  const cfg = STATUS[getStatus(days, task.intervalDays)];
  const selDate = formData.selectedDate || today();
  const isDone = (task.history||[]).includes(selDate);
  return `
  <div style="display:flex;flex-direction:column;height:100vh;background:#F4F6FA;">
    <div style="background:linear-gradient(135deg,#2D3748,#4A5568);padding:52px 20px 20px;color:#fff;flex-shrink:0;">
      <button onclick="closeChart()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:99px;padding:6px 14px;font-size:13px;cursor:pointer;margin-bottom:12px;font-family:inherit;">← 戻る</button>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:26px;">${task.icon}</span>
        <div>
          <div style="font-size:19px;font-weight:700;">${task.name}</div>
          <div style="font-size:11px;opacity:0.6;margin-top:2px;">目安：${task.intervalDays}日ごと</div>
        </div>
      </div>
      <div style="margin-top:14px;background:rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;">
        <div><div style="font-size:10px;opacity:0.6;">前回実施</div><div style="font-size:15px;font-weight:700;margin-top:2px;">${last?fmtDate(last):"未実施"}</div></div>
        <div style="text-align:center;"><div style="font-size:10px;opacity:0.6;">経過</div><div style="font-size:15px;font-weight:700;margin-top:2px;color:${cfg.bar};">${days!==null?`${days}日`:"−"}</div></div>
        <div style="text-align:right;"><div style="font-size:10px;opacity:0.6;">実施回数</div><div style="font-size:15px;font-weight:700;margin-top:2px;">${(task.history||[]).length}回</div></div>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px 12px 32px;">
      <div style="font-size:11px;color:#999;margin-bottom:8px;">経過日数の推移</div>
      <div style="background:#fff;border-radius:14px;padding:14px 8px 8px;box-shadow:0 1px 8px rgba(0,0,0,0.07);margin-bottom:16px;">
        <canvas id="chart-canvas" style="width:100%;display:block;"></canvas>
      </div>
      <div style="background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,0.07);margin-bottom:16px;">
        <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:12px;">日付を指定して記録を編集</div>
        <input type="date" id="date-picker" value="${selDate}" max="${today()}" onchange="onDateChange(this.value)"
          style="width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #E0E0E0;font-size:15px;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:10px;">
        <div style="font-size:12px;color:#AAA;margin-bottom:12px;">${fmtDateLong(selDate)}　→　${isDone?"✅ 実施済み":"⬜ 未実施"}</div>
        ${isDone
          ?`<button onclick="toggleDate('${task.id}','${selDate}',false)" style="width:100%;padding:12px;border-radius:12px;border:1.5px solid #FFCDD2;background:#FFF5F5;color:#E53935;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">この日の記録を削除</button>`
          :`<button onclick="toggleDate('${task.id}','${selDate}',true)" style="width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#5C6BC0,#7E57C2);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">この日を実施済みにする</button>`}
      </div>
      <div style="background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,0.07);">
        <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:10px;">実施履歴　<span style="font-weight:400;color:#AAA;">（タップで削除）</span></div>
        ${!(task.history&&task.history.length)
          ?`<div style="color:#CCC;font-size:13px;text-align:center;padding:16px 0;">まだ記録がありません</div>`
          :`<div style="display:flex;flex-wrap:wrap;gap:6px;">${[...task.history].sort().reverse().map(d=>`<button onclick="toggleDate('${task.id}','${d}',false)" style="background:#EEF0FF;color:#5C6BC0;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;">${fmtDate(d)} <span style="font-size:10px;color:#AAA;">✕</span></button>`).join("")}</div>`}
      </div>
    </div>
  </div>`;
}

// ── モーダル ──
function renderModal() {
  let content = "", title = "";
  if (modalType==="addTask") {
    title="タスクを追加";
    content=inputField("タスク名","name","text","例：トイレ掃除")+inputField("アイコン（絵文字1文字）","icon","text","🚽")+inputField("目安間隔（日数）","intervalDays","number","7")+`<button onclick="submitModal()" style="${pBtn()}">追加する</button>`;
  } else if (modalType==="editTask") {
    title="タスクを編集";
    content=inputField("タスク名","name","text","")+inputField("アイコン（絵文字1文字）","icon","text","")+inputField("目安間隔（日数）","intervalDays","number","")+`<button onclick="submitModal()" style="${pBtn()}">保存する</button><button onclick="deleteItem()" style="width:100%;padding:12px;margin-top:10px;border-radius:12px;border:1.5px solid #FFCDD2;background:#FFF5F5;color:#E53935;font-size:14px;cursor:pointer;font-family:inherit;">このタスクを削除</button>`;
  } else if (modalType==="addGroup") {
    title="グループを追加";
    content=inputField("グループ名","name","text","例：室内")+inputField("アイコン（絵文字1文字）","icon","text","🏠")+`<button onclick="submitModal()" style="${pBtn()}">追加する</button>`;
  } else if (modalType==="editGroup") {
    title="グループを編集";
    content=inputField("グループ名","name","text","")+inputField("アイコン（絵文字1文字）","icon","text","")+`<button onclick="submitModal()" style="${pBtn()}">保存する</button><button onclick="deleteItem()" style="width:100%;padding:12px;margin-top:10px;border-radius:12px;border:1.5px solid #FFCDD2;background:#FFF5F5;color:#E53935;font-size:14px;cursor:pointer;font-family:inherit;">このグループを削除</button>`;
  }
  return `
  <div onclick="closeModal()" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;">
    <div onclick="event.stopPropagation()" style="width:100%;background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;max-height:85vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <span style="font-size:16px;font-weight:700;color:#1a1a2e;">${title}</span>
        <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999;">✕</button>
      </div>
      ${content}
    </div>
  </div>`;
}
function inputField(label,key,type,ph) {
  const val = formData[key]!==undefined ? String(formData[key]).replace(/"/g,"&quot;") : "";
  return `<div style="margin-bottom:14px;"><div style="font-size:12px;color:#888;margin-bottom:4px;font-weight:600;">${label}</div><input type="${type}" placeholder="${ph}" value="${val}" oninput="formData['${key}']=this.value" style="width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #E0E0E0;font-size:15px;font-family:inherit;outline:none;box-sizing:border-box;"></div>`;
}
function pBtn() { return "width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#5C6BC0,#7E57C2);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;"; }

// ── イベントハンドラ ──
function toggleMenu() { showMenu=!showMenu; render(); }

function handleDone(taskId) {
  const td=today();
  groups=groups.map(g=>({...g,tasks:g.tasks.map(t=>t.id===taskId?{...t,history:t.history.includes(td)?t.history:[...t.history,td]}:t)}));
  saveGroups(); render(); showToast("✅ 記録しました！");
}
function handleUndo(taskId) {
  groups=groups.map(g=>({...g,tasks:g.tasks.map(t=>t.id===taskId?{...t,history:t.history.filter(d=>d!==today())}:t)}));
  saveGroups(); render(); showToast("↩️ 取り消しました");
}
function toggleDate(taskId,date,add) {
  groups=groups.map(g=>({...g,tasks:g.tasks.map(t=>t.id===taskId?{...t,history:add?(t.history.includes(date)?t.history:[...t.history,date]):t.history.filter(d=>d!==date)}:t)}));
  saveGroups(); showToast(add?`✅ ${fmtDate(date)} を記録しました`:`🗑️ ${fmtDate(date)} の記録を削除しました`); render();
}
function onDateChange(val) { formData.selectedDate=val; render(); }

function openChart(taskId) {
  chartTaskId=taskId;
  chartFromGroup = (currentView === "group");
  formData={selectedDate:today()};
  currentView="chart";
  render();
}
function closeChart() {
  currentView = chartFromGroup ? "group" : "main";
  chartTaskId=null;
  render();
}

function openModal(type,id) {
  showMenu=false; modalType=type; formData={};
  if (type==="editTask") { const t=findTask(id); if(t) formData={id:t.id,name:t.name,icon:t.icon,intervalDays:String(t.intervalDays)}; }
  else if (type==="editGroup") { const g=findGroup(id); if(g) formData={id:g.id,name:g.name,icon:g.icon}; }
  else if (type==="addTask") { formData={groupId:id,name:"",icon:"",intervalDays:"7"}; }
  render();
}
function closeModal() { modalType=null; formData={}; render(); }

function submitModal() {
  if (modalType==="addTask") {
    if (!formData.name||!formData.name.trim()) return;
    const t={id:uid(),name:formData.name.trim(),icon:formData.icon||"📋",intervalDays:parseInt(formData.intervalDays)||7,history:[]};
    groups=groups.map(g=>g.id===formData.groupId?{...g,tasks:[...g.tasks,t]}:g);
  } else if (modalType==="editTask") {
    groups=groups.map(g=>({...g,tasks:g.tasks.map(t=>t.id===formData.id?{...t,name:formData.name,icon:formData.icon,intervalDays:parseInt(formData.intervalDays)||7}:t)}));
  } else if (modalType==="addGroup") {
    if (!formData.name||!formData.name.trim()) return;
    groups=[...groups,{id:uid(),name:formData.name.trim(),icon:formData.icon||"📁",tasks:[]}];
  } else if (modalType==="editGroup") {
    groups=groups.map(g=>g.id===formData.id?{...g,name:formData.name,icon:formData.icon}:g);
  }
  saveGroups(); closeModal();
}
function deleteItem() {
  if (modalType==="editTask") groups=groups.map(g=>({...g,tasks:g.tasks.filter(t=>t.id!==formData.id)}));
  else if (modalType==="editGroup") groups=groups.filter(g=>g.id!==formData.id);
  saveGroups(); closeModal();
}

async function syncNow() {
  showToast("🔄 同期中...");
  await loadFromCloud();
  render();
  showToast("✅ 同期しました");
}
function exportData() {
  const json=JSON.stringify(groups,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`ouchitask-backup-${today()}.json`; a.click();
  URL.revokeObjectURL(url);
  showMenu=false; render(); showToast("📤 バックアップを保存しました");
}
function importData(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try {
      const parsed=JSON.parse(ev.target.result);
      if(!Array.isArray(parsed)) throw new Error();
      groups=parsed; saveGroups(); showMenu=false; render(); showToast("✅ データを復元しました");
    } catch { showToast("❌ ファイルの形式が正しくありません"); }
  };
  reader.readAsText(file);
}

// ── 起動 ──
(async () => {
  currentView = "loading";
  render();
  await loadFromCloud();
  currentView = "main";
  render();
})();
</script>
</body>
